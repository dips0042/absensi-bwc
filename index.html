<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BWC Connect - Portal</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fcfcfc;
            color: #1a1a1a;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .portal-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .btn-portal {
            background-color: #ffffff;
            color: #1a1a1a;
            border: 1px solid #dee2e6;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-portal:hover {
            background-color: #1a1a1a;
            color: #ffffff;
            border-color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="mb-4">
            <h1 class="fw-bold tracking-tightm-0" style="font-size: 28px; letter-spacing: -0.03em;">⚡ BWC CONNECT</h1>
            <p class="text-muted small mt-2">Sistem Informasi Absensi & Database Jemaat</p>
        </div>
        
        <hr class="my-4" style="border-color: #eaeaea;">

        <div class="d-flex flex-column gap-3">
            <a href="./views/dashboard.html" class="btn btn-portal text-decoration-none">
                📊 Menuju Dashboard Utama
            </a>
            <a href="./views/scan.html" class="btn btn-portal text-decoration-none">
                📷 Scanner QR Absensi
            </a>
            <a href="./views/edit.html" class="btn btn-portal text-decoration-none">
                ⚙️ Data Management Jemaat
            </a>
        </div>

        <div class="mt-5">
            <p class="text-secondary" style="font-size: 11px; font-weight: 500; letter-spacing: 0.05em;">BWC PRODUCTION &copy; 2026</p>
        </div>
    </div>

</body>
</html>
