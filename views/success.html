<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Registrasi Berhasil!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #121212; color: #fff; }</style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="text-center p-4 rounded shadow-lg" style="background-color: #1e1e1e; max-width: 400px; width: 100%; border: 1px solid #2d2d2d;">
        <h3 class="text-success fw-bold mb-2">Registrasi Sukses! 🎉</h3>
        <p class="text-secondary small">Halo <strong id="lblNama">...</strong>, gunakan QR Code ini setiap minggu saat hadir ibadah:</p>
        <div class="bg-white p-3 d-inline-block rounded-3 my-3">
            <img id="imgQr" src="" alt="QR Code" class="img-fluid">
        </div>
        <div class="text-muted font-monospace small mb-4" id="lblId">ID: </div>
        <a id="btnDownload" href="" download="" class="btn btn-success w-100 fw-bold py-2">Simpan ke Handphone</a>
    </div>

    <script>
        (async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            const res = await fetch(`/api/jemaat/${id}`);
            const data = await res.json();

            document.getElementById('lblNama').innerText = data.jemaat.nama_lengkap;
            document.getElementById('lblId').innerText = `ID: ${data.jemaat.id}`;
            document.getElementById('imgQr').src = data.qrDataUrl;
            document.getElementById('btnDownload').href = data.qrDataUrl;
            document.getElementById('btnDownload').download = `BWC_QR_${data.jemaat.nama_lengkap}.png`;
        })();
    </script>
</body>
</html>
