<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BWC Attendance - QR Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { background-color: #fcfcfc; color: #1a1a1a; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .card-custom { background-color: #ffffff; border: 1px solid #eaeaea; border-radius: 16px; }
        #reader { width: 100%; border: none !important; border-radius: 12px; overflow: hidden; background: #fafafa; }
        #reader button {
            background-color: #1a1a1a !important; color: white !important; border: none !important;
            padding: 6px 16px !important; font-size: 13px !important; font-weight: 600 !important;
            border-radius: 20px !important; margin: 10px 2px !important; cursor: pointer;
        }
        #reader button:hover { background-color: #333333 !important; }
        .search-results-box {
            max-height: 200px; overflow-y: auto; border: 1px solid #dee2e6;
            border-radius: 8px; background: #fff; display: none; position: absolute;
            z-index: 1000; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .search-item { padding: 10px 12px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f8f9fa; }
        .search-item:hover { background-color: #f1f3f5; }
        .search-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="py-5">

    <div class="container" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div>
                <h3 class="fw-bold m-0">📷 QR CARD SCANNER</h3>
                <p class="text-muted small m-0">Arahkan kartu QR jemaat BWC ke kamera</p>
            </div>
            <a href="/dashboard" class="btn btn-sm btn-outline-dark px-3 py-2 rounded-pill fw-semibold">Kembali ke Dashboard</a>
        </div>

        <div class="card card-custom p-4 mb-4 shadow-sm">
            <div id="reader"></div>
            <div id="scanResult" class="mt-3 alert d-none text-center fw-bold small"></div>
        </div>

        <div class="card card-custom p-4 shadow-sm">
            <h6 class="fw-bold text-dark mb-1">📝 Registrasi Kehadiran Manual (Search Nama)</h6>
            <p class="text-muted small mb-3">Ketik nama lengkap atau alias jemaat jika tidak membawa kartu QR.</p>
            
            <div class="mb-3 position-relative">
                <input type="text" id="searchJemaatInput" class="form-control py-2 bg-light border-light-subtle" 
                       style="border-radius: 8px; font-size: 14px;" placeholder="Ketik Nama Lengkap / Alias Jemaat..." autocomplete="off">
                <div id="searchResults" class="search-results-box"></div>
            </div>

            <div class="d-flex gap-4 mb-3 ps-1">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="statusHadir" id="radioNormal" value="normal" checked>
                    <label class="form-check-label small fw-medium text-dark" for="radioNormal">
                        🟢 Hadir
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="statusHadir" id="radioTelat" value="telat">
                    <label class="form-check-label small fw-medium text-dark" for="radioTelat">
                        ⚠️ Terlambat
                    </label>
                </div>
            </div>

            <button onclick="submitKehadiranManual()" class="btn btn-dark w-100 py-2 fw-semibold">Catat Kehadiran</button>
            <div id="msgStatusManual" class="mt-3 small text-center fw-bold" style="display:none;"></div>
        </div>
    </div>

    <script>
        let html5QrcodeScanner;
        let masterJemaat = [];
        let selectedJemaatId = "";

        window.addEventListener('DOMContentLoaded', () => {
            initScanner();
            loadDaftarJemaatMaster();
            setupSearchEngine();
        });

        function initScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0
            });
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        async function onScanSuccess(decodedText, decodedResult) {
            const resultDiv = document.getElementById('scanResult');
            resultDiv.className = "mt-3 alert alert-info text-center fw-bold small";
            resultDiv.classList.remove('d-none');
            resultDiv.innerText = "Memproses kode absensi jemaat...";

            html5QrcodeScanner.clear();

            try {
                const res = await fetch('/api/scan/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: decodedText.trim() })
                });
                const data = await res.json();
                
                resultDiv.className = "mt-3 alert text-center fw-bold small " + (data.success ? "alert-success" : "alert-danger");
                resultDiv.innerText = data.success ? `✅ Absensi Berhasil Tercatat!` : `❌ ${data.message}`;
            } catch (err) {
                resultDiv.className = "mt-3 alert alert-danger text-center fw-bold small";
                resultDiv.innerText = "❌ Gagal terhubung ke server.";
            }

            setTimeout(() => {
                resultDiv.classList.add('d-none');
                initScanner();
            }, 3000);
        }

        function onScanFailure(error) { }

        async function loadDaftarJemaatMaster() {
            try {
                const res = await fetch(BASE_URL_API + '?action=getJemaat');
                masterJemaat = await res.json();
                masterJemaat.sort((a,b) => a.nama_lengkap.localeCompare(b.nama_lengkap));
            } catch(e) { console.error("Gagal memuat list jemaat master", e); }
        }

        function setupSearchEngine() {
            const inputEl = document.getElementById('searchJemaatInput');
            const resultsEl = document.getElementById('searchResults');

            inputEl.addEventListener('input', () => {
                const query = inputEl.value.toLowerCase().trim();
                resultsEl.innerHTML = "";
                selectedJemaatId = ""; 

                if (!query) {
                    resultsEl.style.display = "none";
                    return;
                }

                // Filter berdasarkan Nama Lengkap atau Nama Alias
                const filtered = masterJemaat.filter(j => 
                    j.nama_lengkap.toLowerCase().includes(query) || 
                    (j.nama_alias && j.nama_alias.toLowerCase().includes(query))
                );

                if (filtered.length === 0) {
                    resultsEl.innerHTML = `<div class="search-item text-muted italic">Nama tidak ditemukan</div>`;
                    resultsEl.style.display = "block";
                    return;
                }

                filtered.forEach(j => {
                    const aliasLabel = j.nama_alias ? ` (${j.nama_alias})` : '';
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<strong>${j.nama_lengkap}</strong>${aliasLabel} <span class="text-muted small d-block" style="font-size:11px;">COOL: ${j.nama_komsel || 'Belum Ada'}</span>`;
                    
                    div.addEventListener('click', () => {
                        inputEl.value = `${j.nama_lengkap}${aliasLabel}`;
                        selectedJemaatId = j.id;
                        resultsEl.style.display = "none";
                    });
                    resultsEl.appendChild(div);
                });

                resultsEl.style.display = "block";
            });

            // Tutup hasil pencarian jika klik di luar area input
            document.addEventListener('click', (e) => {
                if (e.target !== inputEl && e.target !== resultsEl) {
                    resultsEl.style.display = "none";
                }
            });
        }

        async function submitKehadiranManual() {
            const inputEl = document.getElementById('searchJemaatInput');
            const msgEl = document.getElementById('msgStatusManual');
            const isTelatSelected = document.getElementById('radioTelat').checked;
            
            if(!selectedJemaatId) {
                alert("Silakan ketik dan pilih nama jemaat dari daftar hasil pencarian.");
                return;
            }

            try {
                const res = await fetch(BASE_URL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: selectedJemaatId })
                });
                
                if(res.ok) {
                    const namaTerpilih = inputEl.value;
                    inputEl.value = ""; 
                    selectedJemaatId = "";
                    document.getElementById('radioNormal').checked = true;
                    
                    msgEl.style.display = "block";
                    if(isTelatSelected) {
                        msgEl.className = "mt-3 small text-center fw-bold alert alert-warning";
                        msgEl.innerText = `⚠️ Sukses! ${namaTerpilih} dicatat Terlambat.`;
                    } else {
                        msgEl.className = "mt-3 small text-center fw-bold alert alert-success";
                        msgEl.innerText = `✅ Sukses! ${namaTerpilih} dicatat Hadir.`;
                    }
                    setTimeout(() => { msgEl.style.display = "none"; }, 4000);
                } else {
                    const err = await res.json();
                    alert("Gagal mencatat: " + (err.message || "Kemungkinan jemaat sudah diabsen."));
                }
            } catch (e) { alert("Masalah jaringan ke server."); }
        }
    </script>
</body>
</html>
